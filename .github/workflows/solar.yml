on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'

env:
  MONGO_URI: mongodb+srv://superuser:SuperPassword@supercluster.d83jj.mongodb.net/superData
  MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
  unit-testing:
    name: Unit Testing
    strategy:
      matrix:
        nodejs_version: [18, 19, 20]
        os: [ubuntu-latest, macos-latest]
        exclude:
          - nodejs_version: 18
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Setup NodeJS version - ${{ matrix.nodejs_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.nodejs_version }}

      - name: install dep
        run: npm install

      - name: unit testing
        continue-on-error: true
        #id: hamada
        run: npm test

      - name: archive test result
        if: always()
        #if: steps.hamada.outcome == 'failure' || steps.hamada.outcome == 'success'*/
        uses: actions/upload-artifact@v4
        with:
          name: Mocha-Test-Result-${{ matrix.os }}-${{ matrix.nodejs_version }}
          path: test-results.xml

  code-coverage:
    name: code coverage
    needs: [unit-testing]
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Setup NodeJS version 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dep
        run: npm install

      - name: check code coverage
        continue-on-error: true
        run: npm run coverage

      - name: archive code coverage result
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-result
          path: coverage
          retention-days: 5

  docker:
    name: containerization
    needs: [code-coverage]
    permissions:
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}