name: solar-new system workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'

env:
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
  unit-testing:
    name: Unit Testing
    strategy:
      matrix:
        node-js_version: [18, 19, 20]
        os: [ubuntu-latest, macos-latest]
        exclude:
          - node-js_version: 18
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Setup NodeJs version - ${{ matrix.node-js_version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-js_version }}

      - name: install dep
        run: npm install

      - name: unit testing
        run: npm test