on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'

env:
  MONGO_URI: ${{ secrets.MONGO_URI }}
  MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
  unit-testing:
    name: Unit Testing
    strategy:
      matrix:
        nodejs_version: [18, 19, 20]
        os: [ubuntu-latest, macos-latest]
        exclude:
          - nodejs_version: 18
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Setup NodeJS version - ${{ matrix.nodejs_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.nodejs_version }}

      - name: install dep
        run: npm install

      - name: unit testing
        id: hamada
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
          echo "MONGO_URL=${{ secrets.MONGO_URI }}" >> .env
          echo "DB_CONN=${{ secrets.MONGO_URI }}" >> .env
          echo "DATABASE_URL=${{ secrets.MONGO_URI }}" >> .env
          npm test
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_URL: ${{ secrets.MONGO_URI }}
          DB_CONN: ${{ secrets.MONGO_URI }}
          DATABASE_URL: ${{ secrets.MONGO_URI }}

      - name: archive test result
        if: steps.hamada.outcome == 'failure' || steps.hamada.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Mocha-Test-Result-${{ matrix.os }}-${{ matrix.nodejs_version }}
          path: test-results.xml